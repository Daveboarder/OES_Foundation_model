# =============================================================================
# LIBS Foundation Model — RTX 4090 (24 GB) config for the real LIBS pipeline
# =============================================================================
# Use together with config/libs_data.yaml. The training scripts auto-override
# data.n_bins, model.max_seq_len, data.n_classes and data.n_elements from the
# pipeline output, so the placeholders below are only used until that override
# fires.
#
# Sized for a 17,429-token sequence (17,428 wavelength bins + 1 CLS) at bf16.
# Relies on PyTorch SDPA / FlashAttention (engaged automatically by
# nn.MultiheadAttention with need_weights=False) to keep attention memory
# linear in sequence length.
# =============================================================================

data:
  n_bins: 2048            # placeholder; libs pipeline overrides to 17428
  n_classes: 5            # placeholder; libs pipeline overrides to n_clusters (10)
  synthetic:
    val_fraction: 0.15

model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.1
  max_seq_len: 2049       # placeholder; libs pipeline overrides to 17429

pretrain:
  mask_ratio: 0.15
  mask_token_prob: 0.8
  random_token_prob: 0.1
  contiguous_masking: true
  block_sizes: [25, 50, 100]
  peak_bias_enabled: true
  peak_bias_ratio: 0.5
  peak_threshold: 0.2
  batch_size: 8
  accumulate_grad_batches: 4     # effective batch 32
  epochs: 5                      # sanity-test budget; first epoch ~30 min on 4090
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 1
  min_lr: 1.0e-6

finetune:
  batch_size: 8
  epochs: 5
  warmup_epochs: 1
  learning_rate: 5.0e-5
  weight_decay: 0.01
  freeze_encoder: false

logging:
  logger: "tensorboard"
  log_every_n_steps: 25
  val_check_interval: 1.0

device:
  accelerator: "gpu"
  precision: "bf16-mixed"
