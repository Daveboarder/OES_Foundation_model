# =============================================================================
# Line-token-linear embedding — pre-baked tokens HDF5 + nn.Linear projection
# =============================================================================
# Reads line_tokens_<hash>.h5 produced by data/line_tokenization.py.
# Each token is already a 14-feature float32 vector; the embedding is
# a single nn.Linear followed by wavelength PE + CLS.
#
#   uv run python train_pretrain.py \
#     --config config/config_libs_token_linear_4090.yaml \
#     --libs_data_config config/libs_data.yaml \
#     --line_embedding_config config/line_embedding.yaml \
#     --experiment_name libs_token_linear_4090 \
#     --num_workers 4
# =============================================================================

data:
  n_bins: 2048           # overridden to n_lines after tokens build
  n_classes: 10          # overridden from libs_data downstream.n_clusters
  n_elements: 60
  n_concentration_bins: 1000
  synthetic:
    val_fraction: 0.15

model:
  embedding_type: line_token_linear
  d_model: 128
  n_heads: 8
  n_layers: 6
  d_ff: 512
  dropout: 0.1
  max_seq_len: 8192      # placeholder; set to n_lines + 1
  n_mip_target_channels: 2   # max_intensity + FWHM

pretrain:
  mask_ratio: 0.15
  batch_size: 4
  accumulate_grad_batches: 8
  epochs: 20
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 1
  min_lr: 1.0e-6

finetune:
  batch_size: 4
  epochs: 20
  warmup_epochs: 1
  learning_rate: 5.0e-5
  weight_decay: 0.01
  freeze_encoder: false

logging:
  logger: tensorboard
  log_every_n_steps: 25
  val_check_interval: 1.0

device:
  accelerator: gpu
  precision: bf16-mixed
